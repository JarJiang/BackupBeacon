spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/backupbeacon.db
  sql:
    init:
      mode: always

server:
  port: 18080

backupbeacon:
  fs:
    # 目录选择器可访问的根目录（逗号分隔）
    # Linux: /mnt,/data/backups
    # Windows: ./backup-target,D:/,Z:/
    allowed-roots: ./backup-target,/mnt,/data/backups,D:/,Z:/
    # 可选：容器路径 -> 宿主机路径展示映射，仅用于前端提示
    # 示例：/backup-target=/home/web/backupbeacon/backup-target,/mnt=/mnt/shared
    path-display-map: ${BACKUPBEACON_PATH_DISPLAY_MAP:}