<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BackupBeacon</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <script src="https://unpkg.com/element-ui/lib/index.js"></script>
  <style>
    body { margin: 0; background: #f5f7fa; }
    .wrap { max-width: 1200px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
<div id="app" class="wrap">
  <h2>BackupBeacon - 自动备份管理</h2>
  <el-tabs>
    <el-tab-pane label="连接管理">
      <el-form :inline="true" size="small">
        <el-input v-model="conn.name" placeholder="名称"></el-input>
        <el-select v-model="conn.dbType" placeholder="类型"><el-option label="MySQL" value="mysql"/><el-option label="PostgreSQL" value="postgres"/></el-select>
        <el-input v-model="conn.host" placeholder="主机"></el-input>
        <el-input v-model.number="conn.port" placeholder="端口"></el-input>
        <el-input v-model="conn.username" placeholder="账号"></el-input>
        <el-input v-model="conn.password" placeholder="密码" show-password></el-input>
        <el-button type="primary" @click="addConn">新增</el-button>
      </el-form>
      <el-table :data="connections" style="width:100%;margin-top:12px" size="small">
        <el-table-column prop="id" label="ID" width="60"/>
        <el-table-column prop="name" label="名称"/>
        <el-table-column prop="db_type" label="类型" width="120"/>
        <el-table-column prop="host" label="主机"/>
        <el-table-column prop="port" label="端口" width="100"/>
      </el-table>
    </el-tab-pane>

    <el-tab-pane label="策略管理">
      <el-form :inline="true" size="small">
        <el-input v-model="policy.name" placeholder="策略名"></el-input>
        <el-select v-model.number="policy.connectionId" placeholder="连接" style="width:180px">
          <el-option v-for="c in connections" :key="c.id" :label="c.name" :value="c.id"></el-option>
        </el-select>
        <el-input v-model="policy.databaseName" placeholder="数据库名"></el-input>
        <el-input v-model="policy.tablesCsv" placeholder="表名CSV(可空)"></el-input>
        <el-select v-model="policy.mode" placeholder="模式"><el-option label="全量" value="FULL"/><el-option label="增量/追加" value="INCREMENTAL"/></el-select>
        <el-input v-model.number="policy.intervalMinutes" placeholder="间隔分钟"></el-input>
        <el-input v-model="policy.backupPath" placeholder="服务器目录，如 /backup-target"></el-input>
        <el-button type="primary" @click="addPolicy">新增</el-button>
      </el-form>
      <el-table :data="policies" style="width:100%;margin-top:12px" size="small">
        <el-table-column prop="id" label="ID" width="60"/>
        <el-table-column prop="name" label="策略"/>
        <el-table-column prop="connection_name" label="连接"/>
        <el-table-column prop="database_name" label="数据库"/>
        <el-table-column prop="interval_minutes" label="间隔(分钟)" width="110"/>
        <el-table-column prop="backup_path" label="备份目录"/>
        <el-table-column label="操作" width="120">
          <template slot-scope="scope"><el-button size="mini" @click="runNow(scope.row.id)">立即执行</el-button></template>
        </el-table-column>
      </el-table>
    </el-tab-pane>

    <el-tab-pane label="任务记录">
      <el-button size="small" @click="loadAll">刷新</el-button>
      <el-table :data="jobs" style="width:100%;margin-top:12px" size="small">
        <el-table-column prop="id" label="ID" width="60"/>
        <el-table-column prop="policy_name" label="策略"/>
        <el-table-column prop="status" label="状态" width="100"/>
        <el-table-column prop="message" label="信息"/>
        <el-table-column prop="file_path" label="备份文件"/>
      </el-table>
      <h4>站内通知</h4>
      <el-table :data="notices" size="small">
        <el-table-column prop="id" label="ID" width="60"/>
        <el-table-column prop="level" label="级别" width="100"/>
        <el-table-column prop="content" label="内容"/>
        <el-table-column prop="handled" label="已处理" width="100"/>
      </el-table>
    </el-tab-pane>
  </el-tabs>
</div>

<script>
new Vue({
  el: '#app',
  data: {
    connections: [], policies: [], jobs: [], notices: [],
    conn: {name:'', dbType:'mysql', host:'', port:3306, username:'', password:''},
    policy: {name:'', connectionId:null, databaseName:'', tablesCsv:'', mode:'FULL', intervalMinutes:60, backupPath:'/backup-target'}
  },
  mounted(){ this.loadAll(); },
  methods: {
    async j(url, opt={}){ const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opt}); return r.json(); },
    async loadAll(){
      this.connections = await this.j('/api/connections');
      this.policies = await this.j('/api/policies');
      this.jobs = await this.j('/api/jobs');
      this.notices = await this.j('/api/notices');
    },
    async addConn(){ await this.j('/api/connections',{method:'POST',body:JSON.stringify(this.conn)}); this.conn={name:'',dbType:'mysql',host:'',port:3306,username:'',password:''}; this.loadAll(); },
    async addPolicy(){ await this.j('/api/policies',{method:'POST',body:JSON.stringify(this.policy)}); this.policy={name:'',connectionId:null,databaseName:'',tablesCsv:'',mode:'FULL',intervalMinutes:60,backupPath:'/backup-target'}; this.loadAll(); },
    async runNow(id){ await this.j('/api/policies/'+id+'/run',{method:'POST'}); this.$message.success('已触发'); setTimeout(()=>this.loadAll(),1000); }
  }
});
</script>
</body>
</html>
